{% extends "base.html" %}
{% block content %}

<h2>{{ t('add_availability') }}</h2>

<form method="post">
  <label>
    {{ t('date_time') }}
    <input name="start" type="datetime-local" required>
  </label>

  <label>
    {{ t('duration') }}
    <input name="duration_minutes" type="number" min="15" value="60">
  </label>

  <label>
    {{ t('location') }}
    <input name="location">
  </label>

  <button type="submit">{{ t('save') }}</button>
</form>

{% endblock %}
