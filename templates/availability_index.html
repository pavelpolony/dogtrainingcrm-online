{% extends "base.html" %}
{% block content %}

<h2>{{ t('public_booking') }}</h2>

<table>
    <tr>
        <th>{{ t('date_time') }}</th>
        <th>{{ t('location') }}</th>
        <th></th>
    </tr>

    {% for s in slots %}
    <tr>
        <td>{{ s.date }} {{ s.time }}</td>
        <td>-</td>
        <td>
            <a class="btn" href="{{ url_for('book_slot', slot_id=s.id) }}">
                {{ t('public_booking') }}
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
