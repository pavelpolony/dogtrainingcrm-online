{% extends "base.html" %}
{% block content %}
<h2>{{ t('add_dog') }}</h2>
<form method="post">
  <label>{{ t('name') }}<input name="name" required></label>
  <label>{{ t('breed') }}<input name="breed"></label>
  <label>{{ t('age_years') }}<input name="age_years" type="number" min="0"></label>
  <label>{{ t('notes') }}<textarea name="notes"></textarea></label>
  <button>{{ t('save') }}</button>
</form>
{% endblock %}
