{% extends "base.html" %}
{% block content %}
<h2>{{ t('search') }}</h2>
<form>
  <input name="q" value="{{ q }}" placeholder="{{ t('search_ph') }}">
  <button>{{ t('search') }}</button>
</form>
<ul>
  {% for c in customers %}
  <li><a href="{{ url_for('customer_detail', customer_id=c.id) }}">{{ c.first_name }} {{ c.last_name }}</a> – {{ c.email }} – {{ c.phone }}</li>
  {% endfor %}
</ul>
{% endblock %}
