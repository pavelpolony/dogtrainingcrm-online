{% extends "base.html" %}
{% block content %}

<h2>{{ t('search') }}</h2>

<form method="get">
  <input name="q" value="{{ q }}" placeholder="{{ t('search_ph') }}">
  <button type="submit">{{ t('search') }}</button>
</form>

<ul>
  {% for c in customers %}
  <li>
    <a href="{{ url_for('customer_detail', customer_id=c.id) }}">{{ c.first_name }} {{ c.last_name }}</a>
    – {{ c.email or '' }}
    – {{ c.phone or '' }}
  </li>
  {% endfor %}
</ul>

{% endblock %}
