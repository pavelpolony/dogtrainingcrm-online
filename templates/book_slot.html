{% extends "base.html" %}
{% block content %}

<h2>{{ t('public_booking') }}</h2>

<p>{{ t('date_time') }}: {{ slot.date }} {{ slot.time }}</p>

<form method="post" action="{{ url_for('book_submit', slot_id=slot.id) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <label>{{ t('username') }}
        <input type="text" name="name" required>
    </label>

    <label>{{ t('email') }}
        <input type="email" name="email" required>
    </label>

    <label>{{ t('phone') }}
        <input type="text" name="phone" required>
    </label>

    <button>{{ t('save') }}</button>
</form>

{% endblock %}
