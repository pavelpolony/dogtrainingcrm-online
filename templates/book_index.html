{% extends "base.html" %}
{% block content %}

<h2>{{ t('public_booking') }}</h2>

<table>
  <tr>
    <th>{{ t('date_time') }}</th>
    <th>{{ t('location') }}</th>
    <th></th>
  </tr>
  {% for a in avails %}
  <tr>
    <td>{{ a.start }}</td>
    <td>{{ a.location or '-' }}</td>
    <td>
      <a href="{{ url_for('book_slot', avail_id=a.id) }}">{{ t('book_now') }}</a>
    </td>
  </tr>
  {% endfor %}
</table>

{% endblock %}
